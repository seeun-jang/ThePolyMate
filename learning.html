<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Poly-Mate | 학습 상세</title>
    <link rel="stylesheet" href="styles/learning.css">
</head>
<body>
    <div class="chat-dashboard">
        <header class="chat-header">
            <a href="main.html" class="btn-back">◀ 돌아가기</a>
            <h3>학습 탭</h3>
        </header>
        <div class="chat-content-area">
            <div class="chat-messages">
                <div class="bubble">오늘 공부할 분량과 오답노트를 정리해왔어! C# 예외처리 부분 한 번 더 볼까?</div>
            </div>
            <div class="chat-visual-aid">
                <div class="custom-widget w-pink">
                    <h4>📊 AI 소프트웨어 전공 성취도</h4>
                    <div class="progress-bar"><div class="fill">85% 달성!</div></div>
                    <div class="note-box">
                        <strong>📝 오늘의 오답노트</strong><br><br>
                        - C# 타이머 스톱 게임 로직 복습<br>
                        - 데이터베이스 스키마와 인스턴스 개념 차이 명확히 하기
                    </div>
                </div>
            </div>
        </div>
        <div class="chat-input-area">
            <div class="ai-suggestions">
                <button class="suggest-btn">전체 오답노트 보기</button>
                <button class="suggest-btn">이해 안 가는 부분 질문</button>
            </div>
            <div class="input-box">
                <input type="text" placeholder="궁금한 게 있으면 더 물어봐!">
                <button style="border:none; background:none; font-size:24px; cursor:pointer;">🚀</button>
            </div>
        </div>
    </div>
</body>
</html>
