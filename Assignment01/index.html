<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Poly-Mate | Warm AI Agent</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-home">

    <div id="page-start" class="page active">
        <div class="hero-content">
            <h1 class="main-logo">Poly-Mate</h1>
            <p class="sub-description">
                사용자의 성장을 돕고 일상을 케어하는<br>
                초개인화 AI 에이전트 서비스입니다.
            </p>
            <button class="btn-start" onclick="showPage('page-login')">START</button>
        </div>
    </div>

    <div id="page-login" class="page">
        <div class="login-box">
            <h2>로그인 계정을 선택해주세요 😊</h2>
            <div class="social-logins">
                <button class="social-btn naver"><i class="fa-solid fa-n"></i> 네이버 로그인</button>
                <button class="social-btn google"><i class="fa-brands fa-google"></i> 구글 로그인</button>
                <button class="social-btn apple"><i class="fa-brands fa-apple"></i> 애플 로그인</button>
            </div>
            <div class="input-group">
                <input type="text" placeholder="사용자 아이디">
                <input type="password" placeholder="비밀번호">
                <button class="btn-login" onclick="showPage('page-main')">접속하기</button>
            </div>
        </div>
    </div>

    <div id="page-main" class="page">
        <div class="dashboard-wrapper">
            <nav class="sidebar">
                <div class="char-section">
                    <div class="char-icon">🐶</div>
                    <p class="char-name">Poly</p>
                </div>
                <div class="menu-icons">
                    <i class="fa-solid fa-bookmark" title="북마크 모아보기" onclick="openSection('북마크')"></i>
                    <i class="fa-solid fa-palette" title="테마 변경" onclick="showPage('page-theme')"></i>
                    <i class="fa-solid fa-clock-rotate-left" title="지난 기록"></i>
                </div>
            </nav>

            <main class="main-container">
                <header class="main-header">
                    <h1 class="dashboard-logo">Poly-Mate</h1>
                    <div class="prompt-bar">
                        <input type="text" placeholder="user, 오늘 하루는 어땠어? 나한테 말해줘!">
                        <button><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </header>

                <div class="card-grid">
                    <div class="card p-pink" onclick="openSection('학습')">
                        <h3>📚 학습</h3>
                        <p>성취도 그래프 및 맞춤형 오답노트</p>
                    </div>
                    <div class="card p-blue" onclick="openSection('일정')">
                        <h3>🗓️ 일정</h3>
                        <p>다가오는 시험 및 데일리 루틴 관리</p>
                    </div>
                    <div class="card p-yellow" onclick="openSection('건강')">
                        <h3>🥗 건강</h3>
                        <p>오늘의 추천 식단과 영양소 밸런스</p>
                    </div>
                    <div class="card p-purple" onclick="openSection('영감')">
                        <h3>💡 영감</h3>
                        <p>새로운 디자인 트렌드와 아이디어 아카이빙</p>
                    </div>
                    <div class="card p-green card-drive-thumb" onclick="openSection('여행')">
                        <h3>✈️ 여행</h3>
                        <p>해외 강연장 주변 숙소 및 항공사 비교</p>
                    </div>
                    <div class="card p-grey" onclick="openSection('북마크')">
                        <h3>🔖 북마크</h3>
                        <p>내가 스크랩한 중요한 링크와 메모들</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="page-chat" class="page">
        <div class="chat-dashboard">
            <header class="chat-header">
                <button onclick="showPage('page-main')"><i class="fa-solid fa-chevron-left"></i> 돌아가기</button>
                <h3 id="chat-category-title">섹션 이름</h3>
            </header>
            <div class="chat-content-area">
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-visual-aid" id="chat-visual-aid"></div>
            </div>
            <div class="chat-input-area">
                <div class="ai-suggestions" id="ai-suggestions"></div>
                <div class="input-box">
                    <input type="text" placeholder="궁금한 게 있으면 더 물어봐!">
                    <button><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="page-theme" class="page">
        <div class="theme-selection">
            <h2>테마 선택하기</h2>
            <div class="theme-grid">
                <div class="theme-card t-home" onclick="changeTheme('theme-home')">
                    <div class="preview-box"></div>
                    <p>기본</p>
                </div>
                <div class="theme-card t-drive" onclick="changeTheme('theme-drive')">
                    <div class="preview-box"></div>
                    <p>여행</p>
                </div>
                <div class="theme-card t-space" onclick="changeTheme('theme-space')">
                    <div class="preview-box"></div>
                    <p>우주</p>
                </div>
            </div>
            <button class="btn-back" onclick="showPage('page-main')">닫기</button>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function changeTheme(themeName) {
            document.body.className = themeName;
            showPage('page-main');
        }

        const sectionData = {
            '학습': {
                msg: "오늘 공부할 분량과 오답노트를 정리해왔어! C# 예외처리 부분 한 번 더 볼까?",
                html: `
                    <div class="custom-widget w-pink">
                        <h4>📊 AI 소프트웨어 전공 성취도</h4>
                        <div class="progress-bar"><div class="fill" style="width: 85%;">85% 달성!</div></div>
                        <div class="note-box">
                            <strong>📝 오늘의 오답노트</strong><br><br>
                            - C# 타이머 스톱 게임 로직 복습<br>
                            - 데이터베이스 스키마와 인스턴스 개념 차이 명확히 하기
                        </div>
                    </div>
                `,
                suggest: ["전체 오답노트 보기", "이해 안 가는 부분 질문"]
            },
            '여행': {
                msg: "나중에 멋지게 해외 강연 갈 때를 대비해서, 런던 항공편과 숙소를 미리 싹 비교해뒀어!",
                html: `
                    <div class="custom-widget w-green">
                        <h4>✈️ 런던행 항공사 실시간 비교</h4>
                        <div class="ticket-box">
                            <div class="ticket"><strong>A항공 (직항)</strong> <span>14시간 소요 / 120만원</span></div>
                            <div class="ticket"><strong>B항공 (경유)</strong> <span>18시간 소요 / 95만원</span></div>
                        </div>
                        <p class="hotel-rec">🏨 추천 숙소: 강연장 도보 5분 비즈니스 호텔</p>
                    </div>
                `,
                suggest: ["최저가 알림 설정", "런던 핫플 추천"]
            },
            '건강': {
                msg: "오늘의 Poly Pick 식단이야! 영양 가득하게 준비했어.",
                html: `
                    <div class="custom-widget w-yellow">
                        <h4>🥗 오늘의 식단 칼로리: 450kcal</h4>
                        <p style="font-size: 14px; margin-top: 10px; color: #64748b;">영양소 밸런스 (단백질 40%, 탄수화물 40%, 지방 20%)</p>
                        <div class="nutrient-bar">
                            <div class="protein">단백질</div>
                            <div class="carb">탄수화물</div>
                            <div class="fat">지방</div>
                        </div>
                        <p class="hotel-rec" style="margin-top:15px;">🥑 추천 추가 메뉴: 아보카도 샐러드</p>
                    </div>
                `,
                suggest: ["다른 식단 추천", "운동 루틴 보기"]
            },
            '일정': {
                msg: "시험 준비하느라 바쁘지? 꼬이지 않게 스케줄 싹 정리해뒀어.",
                html: `
                    <div class="custom-widget w-blue">
                        <h4>📅 5월 13일 데일리 루틴</h4>
                        <div class="ticket-box">
                            <div class="ticket"><strong>09:00 AM</strong> <span>프롬프트 엔지니어링 복습</span></div>
                            <div class="ticket" style="border-left: 4px solid #fb7185;"><strong>13:00 PM</strong> <span>전공 중간고사 시험</span></div>
                        </div>
                    </div>
                `,
                suggest: ["알람 설정하기", "주간 일정표"]
            },
            '영감': {
                msg: "네가 좋아할 만한 뽀용하고 핑크핑크한 디자인 레퍼런스를 찾아봤어!",
                html: `
                    <div class="custom-widget w-purple">
                        <h4>💡 추천 디자인 무드보드</h4>
                        <img src="https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?w=400&q=80" style="width: 100%; border-radius: 10px; margin-bottom: 10px;">
                        <p class="hotel-rec">#파스텔 #소프트 #UIUX디자인</p>
                    </div>
                `,
                suggest: ["내 취향에 저장", "비슷한 테마 더 보기"]
            },
            '북마크': {
                msg: "네가 스크랩해둔 중요한 링크들을 카테고리별로 모아뒀어.",
                html: `
                    <div class="custom-widget w-grey">
                        <h4>🔖 최근 스크랩 리스트</h4>
                        <div class="ticket-box">
                            <div class="ticket"><strong>[Github]</strong> <span>C# 오픈소스 리포지토리</span></div>
                            <div class="ticket"><strong>[Youtube]</strong> <span>디자인 포트폴리오 꿀팁</span></div>
                        </div>
                    </div>
                `,
                suggest: ["폴더별로 정리하기", "휴지통 비우기"]
            }
        };

        function openSection(name) {
            const data = sectionData[name];
            document.getElementById('chat-category-title').innerText = name + " 탭";
            document.getElementById('chat-messages').innerHTML = `<div class="bubble bot">${data.msg}</div>`;
            document.getElementById('chat-visual-aid').innerHTML = data.html;
            
            let suggestHTML = "";
            data.suggest.forEach(s => {
                suggestHTML += `<button class="suggest-btn">${s}</button>`;
            });
            document.getElementById('ai-suggestions').innerHTML = suggestHTML;
            
            showPage('page-chat');
        }
    </script>
</body>
</html>
